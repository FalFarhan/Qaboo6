<!-- Prices Table - Glass Style -->
<div class="glass-card overflow-hidden animate-fade-in" style="animation-delay: 0.5s">
    <div class="p-6 border-b border-white/10 flex justify-between items-center">
        <div>
            <h3 class="text-lg font-bold text-white">Live Market</h3>
            <p class="text-sm text-white/40 mt-1">Real-time prices from Binance</p>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
            <span class="text-xs text-white/60">Updating live</span>
        </div>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead>
                <tr class="border-b border-white/5">
                    <th class="p-4 text-left text-xs font-medium text-white/40 uppercase tracking-wider">Asset</th>
                    <th class="p-4 text-right text-xs font-medium text-white/40 uppercase tracking-wider">Price</th>
                    <th class="p-4 text-right text-xs font-medium text-white/40 uppercase tracking-wider">24h Change</th>
                    <th class="p-4 text-right text-xs font-medium text-white/40 uppercase tracking-wider">24h High</th>
                    <th class="p-4 text-right text-xs font-medium text-white/40 uppercase tracking-wider">24h Low</th>
                    <th class="p-4 text-right text-xs font-medium text-white/40 uppercase tracking-wider">Volume</th>
                    <th class="p-4 text-right text-xs font-medium text-white/40 uppercase tracking-wider">Action</th>
                </tr>
            </thead>
            <tbody id="prices-table">
                <!-- Loaded via JS -->
            </tbody>
        </table>
    </div>
</div>
